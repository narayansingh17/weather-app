<!DOCTYPE html>
<html>
  <head>
    <title>Weather App</title>
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header">
      <div class="left-section">
        <img src="images/download.png" class="icon">
      </div>
      <div class="middle-secrion">
        <img src="images/title-icon.png" class="title-icon">
      </div>
      <div class="right-section">
        <img class="hamburger-menu"src="images/hamburger-menu.svg">
      </div>
    </div>
    <div class="search">
      <p class="welcome">
        Welcome! Expose the city you want to feel.
      </p>
      <input type="text" placeholder="Enter name of the city/town" class="search-bar js-search-bar">
    </div>
  </body>
  <script src="scripts/app.js"></script>
</html>
